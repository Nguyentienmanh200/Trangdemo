<!DOCTYPE html>
<html lang="vi" data-bs-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>G-E-C Du Học</title>
  <link rel="icon" id="dynamicFavicon" href="https://img.upanhnhanh.com/8810234eeb91bf4e9ffdb38f28e2d106">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..900&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="loading-screen" style="position:fixed;inset:0;background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:99999;transition:opacity 0.5s;">
    <img src="https://img.upanhnhanh.com/8810234eeb91bf4e9ffdb38f28e2d106" style="width:120px;margin-bottom:20px;" alt="GEC Logo">
    <div style="width:50px;height:50px;border:3px solid #e2e8f0;border-top-color:#8B5E3C;border-radius:50%;animation:spin 0.8s linear infinite;"></div>
  </div>

  <nav class="navbar navbar-expand-lg fixed-top">
    <div class="container">
      <a class="navbar-brand" href="index.html"><img src="https://img.upanhnhanh.com/8810234eeb91bf4e9ffdb38f28e2d106" height="40" class="me-2 logo-img"><span class="logo-g">G</span>.<span class="logo-e">E</span>.<span class="logo-c">C</span> <small>Du Học</small></a>
      <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#nav"><span class="navbar-toggler-icon"></span></button>
      <div class="collapse navbar-collapse" id="nav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link active" href="index.html">Trang chủ</a></li>
          <li class="nav-item"><a class="nav-link" href="#duhoc">Du học</a></li>
          <li class="nav-item"><a class="nav-link" href="#dangky">Đăng ký</a></li>
          <li class="nav-item"><a class="nav-link" href="admin.html">Admin</a></li>
          <li class="nav-item"><button id="themeToggle" class="btn btn-sm ms-2">🌓</button></li>
        </ul>
      </div>
    </div>
  </nav>

  <section class="hero-section" id="home">
    <div class="container text-center">
      <h1 class="hero-title">Chắp Cánh <span class="highlight">Ước Mơ</span><br>Toàn Cầu</h1>
      <p class="text-secondary mb-4">Cùng G-E-C chinh phục du học Nhật, Hàn, Đức, Úc, Canada, Mỹ...</p>
      <a href="#dangky" class="btn-glow">Đăng ký tư vấn miễn phí</a>
    </div>
  </section>

  <section id="duhoc" class="py-5">
    <div class="container">
      <div class="section-title"><h2>Các Quốc Gia</h2><div class="line"></div></div>
      <div class="row g-4" id="countryGrid"></div>
    </div>
  </section>

  <section id="dangky" class="py-5 bg-light">
    <div class="container">
      <div class="row justify-content-center"><div class="col-lg-6">
        <div class="glass-card p-4 p-md-5">
          <div class="section-title"><h2>Đăng Ký Tư Vấn</h2><div class="line"></div></div>
          <form id="registerForm">
            <input class="form-control mb-3" placeholder="Họ tên" id="regName" required>
            <input class="form-control mb-3" placeholder="Số điện thoại" id="regPhone" required>
            <input class="form-control mb-3" placeholder="Email" id="regEmail">
            <select class="form-select mb-3" id="regCountry"></select>
            <textarea class="form-control mb-3" rows="2" placeholder="Ghi chú" id="regNote"></textarea>
            <button class="btn-glow w-100">Gửi đăng ký</button>
          </form>
          <div id="registerSuccess" class="text-center mt-3 d-none">✅ Đăng ký thành công!</div>
        </div>
      </div></div>
    </div>
  </section>

  <footer class="text-center"><div class="container"><p>© 2026 G-E-C Du Học | Hotline: <span id="footerPhone"></span></p></div></footer>

  <!-- AI Chat, Dock -->
  <div class="ai-chat-bubble"><button class="ai-chat-btn" id="aiChatToggle"><i class="fas fa-robot"></i></button></div>
  <div class="ai-chat-window" id="aiChatWindow">...</div>
  <div class="floating-dock"><div class="dock-menu" id="dockMenu"></div><button class="dock-toggle" id="dockToggle"><i class="fas fa-comments"></i></button></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.js"></script>
  <script src="js/gist-api.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
