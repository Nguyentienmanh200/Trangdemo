<!DOCTYPE html>
<html lang="vi" data-bs-theme="light">
<head>
  <meta charset="UTF-8">
  <title>Admin G‑E‑C</title>
  <link rel="icon" href="https://img.upanhnhanh.com/8810234eeb91bf4e9ffdb38f28e2d106">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    :root { --brown: #8B5E3C; --red: #DC2626; --green: #16A34A; --bg: #f8fafc; --card-bg: #fff; --border: #e2e8f0; --shadow: 0 4px 20px rgba(0,0,0,0.05); }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: #1e293b; }
    .sidebar { background: #fff; min-height: 100vh; border-right: 1px solid var(--border); padding: 20px; }
    .nav-pills .nav-link { color: #1e293b; border-radius: 10px; }
    .nav-pills .nav-link.active, .nav-pills .nav-link:hover { background: rgba(139,94,60,0.1); color: var(--brown); font-weight:600; }
    .card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 16px; box-shadow: var(--shadow); }
    .form-control, .form-select { border-radius: 10px; border-color: var(--border); }
    .btn-primary { background: var(--brown); border: none; border-radius: 10px; }
    .btn-primary:hover { background: #6b4328; }
    .btn-success { background: var(--green); border: none; border-radius: 10px; }
    .btn-danger { background: var(--red); border: none; border-radius: 10px; }
    .stats-card { background: #fff; border-radius: 16px; padding: 20px; text-align: center; box-shadow: var(--shadow); }
    .stats-card h2 { font-size: 2.5rem; font-weight: 800; color: var(--brown); }
    .token-box input { width: 200px; }
  </style>
</head>
<body>
<div class="container-fluid">
  <div class="row">
    <nav class="col-md-3 col-lg-2 sidebar">
      <div class="d-flex align-items-center gap-2 mb-4">
        <img src="https://img.upanhnhanh.com/8810234eeb91bf4e9ffdb38f28e2d106" height="35">
        <h5 class="m-0"><span style="color:var(--brown);">G</span><span style="color:var(--red);">.</span><span style="color:var(--green);">C</span> Admin</h5>
      </div>
      <div class="token-box mb-3"><input type="password" id="gistToken" class="form-control form-control-sm" placeholder="GitHub Token"><button class="btn btn-sm btn-outline-secondary mt-1" id="saveTokenBtn">Lưu</button></div>
      <div class="token-box mb-3"><input type="text" id="gistIdInput" class="form-control form-control-sm" placeholder="Gist ID"><button class="btn btn-sm btn-outline-secondary mt-1" id="saveGistIdBtn">Lưu</button></div>
      <ul class="nav nav-pills flex-column" id="adminTabs">
        <li class="nav-item"><a class="nav-link active" data-bs-toggle="pill" href="#tab-dashboard"><i class="fas fa-chart-bar me-2"></i>Dashboard</a></li>
        <li class="nav-item"><a class="nav-link" data-bs-toggle="pill" href="#tab-countries"><i class="fas fa-globe me-2"></i>Quốc gia</a></li>
        <li class="nav-item"><a class="nav-link" data-bs-toggle="pill" href="#tab-settings"><i class="fas fa-cog me-2"></i>Cài đặt</a></li>
      </ul>
      <button class="btn btn-primary w-100 mt-3" id="syncGistBtn">Đồng bộ Gist</button>
      <button class="btn btn-outline-secondary w-100 mt-2" id="exportBtn">Xuất JSON</button>
      <label class="btn btn-outline-info w-100 mt-1"><input type="file" id="importFile" accept=".json" hidden> Nhập JSON</label>
    </nav>

    <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 py-4">
      <div class="tab-content">
        <!-- Dashboard -->
        <div class="tab-pane fade show active" id="tab-dashboard">
          <h3>Tổng quan</h3>
          <div class="row g-4 mt-2">
            <div class="col-md-4"><div class="stats-card"><h2 id="visitCount">...</h2><p>Lượt truy cập</p><button class="btn btn-sm btn-outline-secondary" id="refreshVisits">Làm mới</button></div></div>
            <div class="col-md-4"><div class="stats-card"><h2 id="countryCount">0</h2><p>Quốc gia</p></div></div>
            <div class="col-md-4"><div class="stats-card"><h2 id="postCount">0</h2><p>Bài viết</p></div></div>
          </div>
        </div>
        <!-- Quốc gia -->
        <div class="tab-pane fade" id="tab-countries">
          <h3>Quốc gia</h3>
          <div id="countryList" class="list-group mb-3"></div>
          <button class="btn btn-primary" id="addCountryBtn"><i class="fas fa-plus"></i> Thêm</button>
          <form id="countryForm" class="card p-3 mt-2 d-none">
            <input type="hidden" id="countryIndex">
            <div class="row g-2">
              <div class="col-md-6"><input class="form-control" placeholder="Tên" id="cName"></div>
              <div class="col-md-6"><input class="form-control" placeholder="Slug" id="cSlug"></div>
              <div class="col-md-2"><input class="form-control" placeholder="Flag" id="cFlag"></div>
              <div class="col-md-10"><input class="form-control" placeholder="Link ảnh" id="cImage"></div>
              <div class="col-12"><textarea class="form-control" rows="2" placeholder="Mô tả" id="cDesc"></textarea></div>
              <div class="col-md-4"><input class="form-control" placeholder="Điều kiện" id="cCondition"></div>
              <div class="col-md-4"><input class="form-control" placeholder="Chi phí" id="cCost"></div>
              <div class="col-md-4"><input class="form-control" placeholder="Học bổng" id="cScholarship"></div>
              <div class="col-12"><button type="submit" class="btn btn-success">Lưu</button></div>
            </div>
          </form>
        </div>
        <!-- Cài đặt -->
        <div class="tab-pane fade" id="tab-settings">
          <h3>Cài đặt</h3>
          <div class="card p-4">
            <h5>Liên hệ</h5>
            <div class="row g-2">
              <div class="col-md-6"><label>Điện thoại</label><input class="form-control" id="setPhone"></div>
              <div class="col-md-6"><label>Email</label><input class="form-control" id="setEmail"></div>
              <div class="col-12"><label>Địa chỉ</label><input class="form-control" id="setAddress"></div>
            </div>
            <h5 class="mt-3">Telegram</h5>
            <div class="row g-2">
              <div class="col-md-6"><label>Bot Token</label><input class="form-control" id="telegramBotToken"></div>
              <div class="col-md-6"><label>Chat ID</label><input class="form-control" id="telegramChatId"></div>
            </div>
            <h5 class="mt-3">Logo URL</h5>
            <input class="form-control" id="logoUrl">
            <h5 class="mt-3">AI Responses (JSON)</h5>
            <textarea class="form-control" rows="4" id="aiResponses"></textarea>
            <button class="btn btn-primary mt-3" id="saveSettingsBtn">Lưu cài đặt</button>
          </div>
        </div>
      </div>
    </main>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/gist-api.js"></script>
<script src="js/admin.js"></script>
<script>
  document.getElementById('gistToken').value = localStorage.getItem('gec_github_token')||'';
  document.getElementById('gistIdInput').value = localStorage.getItem('gec_gist_id')||'';
  document.getElementById('saveTokenBtn').onclick = ()=> { localStorage.setItem('gec_github_token', document.getElementById('gistToken').value); alert('Đã lưu token'); };
  document.getElementById('saveGistIdBtn').onclick = ()=> { localStorage.setItem('gec_gist_id', document.getElementById('gistIdInput').value); alert('Đã lưu Gist ID'); };
</script>
</body>
</html>
