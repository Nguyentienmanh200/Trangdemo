<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin G-E-C Du Học</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; background: #0a0a1a; color: #f1f5f9; }
    .sidebar { background: rgba(15,15,35,0.9); backdrop-filter: blur(20px); min-height: 100vh; padding: 20px; }
    .nav-pills .nav-link { color: #cbd5e1; border-radius: 8px; margin-bottom: 4px; }
    .nav-pills .nav-link.active, .nav-pills .nav-link:hover { background: rgba(139,94,60,0.3); color: #fff; }
    .card { background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; }
    .form-control, .form-select { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.15); color: #fff; }
    .form-control:focus { background: rgba(255,255,255,0.1); color: #fff; box-shadow: 0 0 0 0.25rem rgba(139,94,60,0.25); }
    .btn-primary { background: #8B5E3C; border: none; }
    .btn-primary:hover { background: #6b4328; }
  </style>
</head>
<body>
<div class="container-fluid">
  <div class="row">
    <nav class="col-md-3 col-lg-2 d-md-block sidebar">
      <h4 class="text-white mb-4"><span style="color:#8B5E3C;">G</span>.<span style="color:#DC2626;">E</span>.<span style="color:#16A34A;">C</span> Admin</h4>
      <div class="mb-3"><input type="password" class="form-control form-control-sm" id="gistToken" placeholder="GitHub Token"><button class="btn btn-sm btn-outline-light mt-1" id="saveTokenBtn">Lưu Token</button></div>
      <div class="mb-3"><input type="text" class="form-control form-control-sm" id="gistIdInput" placeholder="Gist ID"><button class="btn btn-sm btn-outline-light mt-1" id="saveGistIdBtn">Lưu Gist ID</button></div>
      <ul class="nav nav-pills flex-column" id="adminTabs">
        <li class="nav-item"><a class="nav-link active" data-bs-toggle="pill" href="#tab-countries"><i class="fas fa-globe me-2"></i>Quốc gia</a></li>
        <li class="nav-item"><a class="nav-link" data-bs-toggle="pill" href="#tab-scholarships"><i class="fas fa-graduation-cap me-2"></i>Học bổng</a></li>
        <li class="nav-item"><a class="nav-link" data-bs-toggle="pill" href="#tab-courses"><i class="fas fa-book me-2"></i>Khóa học</a></li>
        <li class="nav-item"><a class="nav-link" data-bs-toggle="pill" href="#tab-posts"><i class="fas fa-newspaper me-2"></i>Tin tức</a></li>
        <li class="nav-item"><a class="nav-link" data-bs-toggle="pill" href="#tab-students"><i class="fas fa-user-graduate me-2"></i>Học viên</a></li>
        <li class="nav-item"><a class="nav-link" data-bs-toggle="pill" href="#tab-settings"><i class="fas fa-cog me-2"></i>Cài đặt</a></li>
      </ul>
      <button class="btn btn-primary w-100 mt-3" id="syncGistBtn"><i class="fas fa-cloud-upload-alt me-2"></i>Đồng bộ lên Gist</button>
      <div class="mt-2"><button class="btn btn-sm btn-outline-warning w-100" id="exportBtn">Xuất JSON</button></div>
      <div class="mt-1"><label class="btn btn-sm btn-outline-info w-100"><input type="file" id="importFile" accept=".json" hidden> Nhập JSON</label></div>
    </nav>

    <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 py-4">
      <div class="tab-content">
        <!-- Quốc gia -->
        <div class="tab-pane fade show active" id="tab-countries">
          <h3>Quốc gia</h3>
          <div id="countryList" class="list-group mb-3"></div>
          <button class="btn btn-primary" id="addCountryBtn"><i class="fas fa-plus"></i> Thêm</button>
          <form id="countryForm" class="card p-3 mt-2 d-none">
            <input type="hidden" id="countryIndex">
            <div class="row g-2">
              <div class="col-md-6"><input class="form-control" placeholder="Tên" id="cName"></div>
              <div class="col-md-6"><input class="form-control" placeholder="Slug" id="cSlug"></div>
              <div class="col-md-2"><input class="form-control" placeholder="Flag" id="cFlag"></div>
              <div class="col-md-10"><input class="form-control" placeholder="Link ảnh" id="cImage"></div>
              <div class="col-12"><textarea class="form-control" rows="2" placeholder="Mô tả" id="cDesc"></textarea></div>
              <div class="col-md-4"><input class="form-control" placeholder="Điều kiện" id="cCondition"></div>
              <div class="col-md-4"><input class="form-control" placeholder="Chi phí" id="cCost"></div>
              <div class="col-md-4"><input class="form-control" placeholder="Học bổng" id="cScholarship"></div>
              <div class="col-12"><button type="submit" class="btn btn-success">Lưu</button></div>
            </div>
          </form>
        </div>
        <!-- Học bổng, Khóa học, Tin tức, Học viên (tương tự) -->
        <!-- ... -->
        <!-- Cài đặt -->
        <div class="tab-pane fade" id="tab-settings">
          <h3>Cài đặt chung</h3>
          <div class="card p-4">
            <h5>Thông tin liên hệ</h5>
            <div class="row g-2">
              <div class="col-md-6"><label>Điện thoại</label><input class="form-control" id="setPhone"></div>
              <div class="col-md-6"><label>Email</label><input class="form-control" id="setEmail"></div>
              <div class="col-12"><label>Địa chỉ</label><input class="form-control" id="setAddress"></div>
            </div>
            <h5 class="mt-3">Mạng xã hội</h5>
            <div class="row g-2" id="socialsContainer"></div>
            <h5 class="mt-3">Telegram Bot</h5>
            <div class="row g-2">
              <div class="col-md-6"><label>Bot Token</label><input class="form-control" id="telegramBotToken"></div>
              <div class="col-md-6"><label>Chat ID</label><input class="form-control" id="telegramChatId"></div>
            </div>
            <h5 class="mt-3">AI Chat Responses (JSON)</h5>
            <textarea class="form-control" rows="6" id="aiResponses"></textarea>
            <button class="btn btn-primary mt-3" id="saveSettingsBtn">Lưu cài đặt</button>
          </div>
        </div>
      </div>
    </main>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/gist-api.js"></script>
<script src="js/admin.js"></script>
<script>
  // Khởi tạo token/gist id
  document.getElementById('gistToken').value = localStorage.getItem('gec_github_token')||'';
  document.getElementById('gistIdInput').value = localStorage.getItem('gec_gist_id')||'';
  document.getElementById('saveTokenBtn').onclick = () => {
    localStorage.setItem('gec_github_token', document.getElementById('gistToken').value);
    alert('Đã lưu token');
  };
  document.getElementById('saveGistIdBtn').onclick = () => {
    localStorage.setItem('gec_gist_id', document.getElementById('gistIdInput').value);
    alert('Đã lưu Gist ID');
  };
</script>
</body>
</html>
