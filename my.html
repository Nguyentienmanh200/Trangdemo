<!DOCTYPE html>
<html lang="vi" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Du học Mỹ - G-E-C</title>
  <meta name="description" content="Du học Mỹ cùng G-E-C - Chi phí, điều kiện, học bổng">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..900&family=Playfair+Display:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
  <div id="loading-screen" style="position:fixed;inset:0;background:#0a0a1a;display:flex;align-items:center;justify-content:center;z-index:99999;">
    <div style="font-size:4rem;font-weight:900;background:linear-gradient(135deg,#8B5E3C,#DC2626,#16A34A);-webkit-background-clip:text;-webkit-text-fill-color:transparent;">G.E.C</div>
  </div>
  <nav class="navbar navbar-expand-lg navbar-glass fixed-top"><div class="container"><a class="navbar-brand" href="index.html"><span class="logo-g">G</span>.<span class="logo-e">E</span>.<span class="logo-c">C</span></a></div></nav>
  <div class="container pt-5 mt-5">
    <a href="index.html" class="btn btn-outline-light mb-4"><i class="fas fa-arrow-left"></i> Trang chủ</a>
    <div class="row g-4">
      <div class="col-lg-6"><div class="glass-card p-4"><h1 id="cName"></h1><p id="cDesc"></p><p><strong>Điều kiện:</strong> <span id="cCondition"></span></p><p><strong>Chi phí:</strong> <span id="cCost"></span></p><p><strong>Học bổng:</strong> <span id="cScholarship"></span></p><a href="index.html#dangky" class="btn-glow">Đăng ký ngay</a></div></div>
      <div class="col-lg-6"><img id="cImage" class="glass-card w-100" style="border-radius:20px;"></div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/gist-api.js"></script>
  <script src="js/app.js"></script>
  <script>
    (async () => {
      await loadSiteData();
      const country = siteData.countries.find(c => c.slug === 'my');
      if (country) {
        document.getElementById('cName').textContent = country.flag + ' ' + country.name;
        document.getElementById('cDesc').textContent = country.desc;
        document.getElementById('cCondition').textContent = country.condition;
        document.getElementById('cCost').textContent = country.cost;
        document.getElementById('cScholarship').textContent = country.scholarship;
        document.getElementById('cImage').src = country.image;
        document.title = 'Du học ' + country.name + ' - G-E-C';
      }
      setTimeout(() => document.getElementById('loading-screen')?.classList.add('hidden'), 1000);
    })();
  </script>
</body>
</html>
