<!DOCTYPE html>
<html lang="vi" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Du học Đức - G-E-C</title>
  <meta name="description" content="Du học Đức cùng G-E-C - Miễn học phí, chi phí thấp, học bổng DAAD">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..900&family=Playfair+Display:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
  <div id="loading-screen" style="position:fixed;inset:0;background:#0a0a1a;display:flex;align-items:center;justify-content:center;z-index:99999;">
    <div style="font-size:4rem;font-weight:900;background:linear-gradient(135deg,#8B5E3C,#DC2626,#16A34A);-webkit-background-clip:text;-webkit-text-fill-color:transparent;">G.E.C</div>
  </div>
  <nav class="navbar navbar-expand-lg navbar-glass fixed-top">
    <div class="container">
      <a class="navbar-brand" href="index.html"><span class="logo-g">G</span>.<span class="logo-e">E</span>.<span class="logo-c">C</span> <small style="color:#cbd5e1;">Du Học</small></a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"><span class="navbar-toggler-icon" style="filter:invert(1)"></span></button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="index.html">Trang chủ</a></li>
          <li class="nav-item"><a class="nav-link" href="index.html#duhoc">Du học</a></li>
          <li class="nav-item"><a class="nav-link" href="index.html#dangky">Đăng ký</a></li>
          <li class="nav-item"><button class="theme-toggle ms-2" id="themeToggle" style="background:transparent;border:none;color:#fff;font-size:1.2rem;"><i class="fas fa-moon"></i></button></li>
        </ul>
      </div>
    </div>
  </nav>
  <div class="container pt-5 mt-5">
    <a href="index.html" class="btn btn-outline-light mb-4"><i class="fas fa-arrow-left"></i> Trang chủ</a>
    <div class="row g-4">
      <div class="col-lg-6"><div class="glass-card p-4 p-md-5"><h1 id="cName" style="font-family:'Playfair Display',serif;font-size:2.5rem;"></h1><p id="cDesc" class="text-secondary lead mb-4"></p><div class="row g-3 mb-4"><div class="col-sm-6"><div class="glass p-3"><h5 class="text-info"><i class="fas fa-check-circle me-2"></i>Điều kiện</h5><p id="cCondition" class="mb-0"></p></div></div><div class="col-sm-6"><div class="glass p-3"><h5 class="text-warning"><i class="fas fa-coins me-2"></i>Chi phí</h5><p id="cCost" class="mb-0"></p></div></div><div class="col-12"><div class="glass p-3"><h5 class="text-success"><i class="fas fa-graduation-cap me-2"></i>Học bổng</h5><p id="cScholarship" class="mb-0"></p></div></div></div><a href="index.html#dangky" class="btn-glow"><i class="fas fa-paper-plane me-2"></i>Đăng ký tư vấn ngay</a></div></div>
      <div class="col-lg-6"><img id="cImage" class="glass-card w-100" style="border-radius:20px;max-height:500px;object-fit:cover;width:100%;" alt="Du học Đức"></div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/gist-api.js"></script>
  <script src="js/app.js"></script>
  <script>
    (async () => {
      await loadSiteData();
      const country = siteData.countries.find(c => c.slug === 'duc');
      if (country) {
        document.getElementById('cName').textContent = country.flag + ' ' + country.name;
        document.getElementById('cDesc').textContent = country.desc;
        document.getElementById('cCondition').textContent = country.condition;
        document.getElementById('cCost').textContent = country.cost;
        document.getElementById('cScholarship').textContent = country.scholarship;
        document.getElementById('cImage').src = country.image;
        document.title = 'Du học ' + country.name + ' - G-E-C';
      }
      setTimeout(() => document.getElementById('loading-screen')?.classList.add('hidden'), 1000);
      document.getElementById('themeToggle').onclick = () => {
        const html = document.documentElement;
        const next = html.getAttribute('data-bs-theme') === 'dark' ? 'light' : 'dark';
        html.setAttribute('data-bs-theme', next);
        document.getElementById('themeToggle').innerHTML = next==='dark' ? '<i class="fas fa-moon"></i>' : '<i class="fas fa-sun"></i>';
      };
    })();
  </script>
</body>
</html>
