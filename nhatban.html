<!DOCTYPE html>
<html lang="vi" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Du học Nhật Bản - G-E-C</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..900&family=Playfair+Display:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
  <nav class="navbar navbar-glass fixed-top"><div class="container"><a class="navbar-brand" href="index.html"><span class="logo-g">G</span>.<span class="logo-e">E</span>.<span class="logo-c">C</span></a></div></nav>
  <div class="container pt-5 mt-5" id="countryDetail">
    <a href="index.html" class="btn btn-outline-light mb-4"><i class="fas fa-arrow-left"></i> Trang chủ</a>
    <div class="row">
      <div class="col-lg-6"><div class="glass-card p-4"><h1 id="cName"></h1><p id="cDesc" class="text-secondary"></p><div class="row g-3"><div class="col-6"><div class="glass p-3"><strong>Điều kiện</strong><p id="cCondition"></p></div></div><div class="col-6"><div class="glass p-3"><strong>Chi phí</strong><p id="cCost"></p></div></div><div class="col-12"><div class="glass p-3"><strong>Học bổng</strong><p id="cScholarship"></p></div></div></div><a href="index.html#dangky" class="btn-glow mt-3">Đăng ký ngay</a></div></div>
      <div class="col-lg-6"><img id="cImage" class="glass-card w-100" style="border-radius:20px;max-height:400px;object-fit:cover;"></div>
    </div>
  </div>
  <script src="js/gist-api.js"></script>
  <script src="js/app.js"></script>
  <script>
    (async () => {
      await loadSiteData();
      const country = siteData.countries.find(c => c.slug === 'nhatban');
      if (country) {
        document.getElementById('cName').textContent = country.flag + ' ' + country.name;
        document.getElementById('cDesc').textContent = country.desc;
        document.getElementById('cCondition').textContent = country.condition;
        document.getElementById('cCost').textContent = country.cost;
        document.getElementById('cScholarship').textContent = country.scholarship;
        document.getElementById('cImage').src = country.image;
      }
    })();
  </script>
</body>
</html>
