<!DOCTYPE html>
<html lang="vi" data-bs-theme="light">
<head>
  <meta charset="UTF-8">
  <title>Du học Nhật Bản - G-E-C</title>
  <link rel="icon" href="https://img.upanhnhanh.com/8810234eeb91bf4e9ffdb38f28e2d106">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..900&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
  <div id="loading-screen">
    <img src="https://img.upanhnhanh.com/8810234eeb91bf4e9ffdb38f28e2d106" style="width:100px;">
    <div class="loader-spinner"></div>
  </div>
  <nav class="navbar navbar-expand-lg fixed-top"><div class="container"><a class="navbar-brand" href="index.html"><img src="https://img.upanhnhanh.com/8810234eeb91bf4e9ffdb38f28e2d106" height="35" class="me-2 logo-img"><span class="logo-g">G</span>.<span class="logo-e">E</span>.<span class="logo-c">C</span></a></div></nav>
  <div class="container pt-5 mt-5">
    <a href="index.html" class="btn btn-outline mb-3">← Trang chủ</a>
    <div class="row">
      <div class="col-lg-6"><div class="glass-card p-4"><h1 id="cName"></h1><p id="cDesc"></p><p><strong>Điều kiện:</strong> <span id="cCondition"></span></p><p><strong>Chi phí:</strong> <span id="cCost"></span></p><p><strong>Học bổng:</strong> <span id="cScholarship"></span></p><a href="index.html#dangky" class="btn-elastic">Đăng ký ngay</a></div></div>
      <div class="col-lg-6"><img id="cImage" class="glass-card w-100" style="border-radius:20px;"></div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/gist-api.js"></script>
  <script src="js/app.js"></script>
  <script>
    (async ()=>{
      await loadSiteData();
      const c = siteData.countries.find(x=>x.slug==='nhatban');
      if(c){
        document.getElementById('cName').textContent=c.flag+' '+c.name;
        document.getElementById('cDesc').textContent=c.desc;
        document.getElementById('cCondition').textContent=c.condition;
        document.getElementById('cCost').textContent=c.cost;
        document.getElementById('cScholarship').textContent=c.scholarship;
        document.getElementById('cImage').src=c.image;
        document.title='Du học '+c.name+' - G-E-C';
      }
      document.getElementById('loading-screen').classList.add('hidden');
    })();
  </script>
</body>
</html>
